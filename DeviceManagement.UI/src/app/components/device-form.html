<div class="form-card">
  <h2>{{ isEditMode ? 'Edit Device' : 'Add New Device' }}</h2>

  @if (errorMessage) {
    <div class="error">{{ errorMessage }}</div>
  }

  <form #deviceForm="ngForm" (ngSubmit)="deviceForm.valid && onSubmit()">
    <div class="form-group">
      <label for="name">Name *</label>
      <input id="name" name="name" [(ngModel)]="device.name" required />
    </div>

    <div class="form-group">
      <label for="manufacturer">Manufacturer *</label>
      <input id="manufacturer" name="manufacturer" [(ngModel)]="device.manufacturer" required />
    </div>

    <div class="form-group">
      <label for="type">Type *</label>
      <select id="type" name="type" [(ngModel)]="device.type" required>
        <option value="">-- Select --</option>
        <option value="phone">Phone</option>
        <option value="tablet">Tablet</option>
      </select>
    </div>

    <div class="form-group">
      <label for="operatingSystem">Operating System *</label>
      <input id="operatingSystem" name="operatingSystem" [(ngModel)]="device.operatingSystem" required />
    </div>

    <div class="form-group">
      <label for="osVersion">OS Version *</label>
      <input id="osVersion" name="osVersion" [(ngModel)]="device.osVersion" required />
    </div>

    <div class="form-group">
      <label for="processor">Processor *</label>
      <input id="processor" name="processor" [(ngModel)]="device.processor" required />
    </div>

    <div class="form-group">
      <label for="ramAmount">RAM Amount *</label>
      <input id="ramAmount" name="ramAmount" [(ngModel)]="device.ramAmount" required />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" [(ngModel)]="device.description" rows="3"></textarea>
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="!deviceForm.valid">
        {{ isEditMode ? 'Save Changes' : 'Create Device' }}
      </button>
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
